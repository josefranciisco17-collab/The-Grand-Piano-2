<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Compras - The Grand Piano</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia,serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.94)),
url("background.png") center/cover no-repeat fixed;
color:#fff;
padding:18px;
}

.container{
max-width:760px;
margin:auto;
background:rgba(10,10,10,.92);
border:1px solid rgba(212,175,55,.35);
border-radius:32px;
padding:26px;
box-shadow:0 0 35px rgba(212,175,55,.14);
}

.title{
font-size:38px;
font-weight:bold;
text-align:center;
color:#d4af37;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#cfcfcf;
font-size:17px;
margin-bottom:28px;
}

.history-list{
display:flex;
flex-direction:column;
gap:14px;
}

.history-empty{
text-align:center;
padding:35px 20px;
border-radius:22px;
background:rgba(25,25,25,.95);
border:1px solid rgba(212,175,55,.25);
color:#bdbdbd;
font-size:17px;
}

.back-btn{
width:100%;
margin-top:28px;
padding:17px;
border:none;
border-radius:18px;
background:linear-gradient(180deg,#d4af37,#b8860b);
color:#111;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">
        📜 Historial
    </div>

    <div class="subtitle">
        Aquí aparecerán tus compras y movimientos de monedas.
    </div>

    <div class="history-list" id="historyList">

        <div class="history-empty">
            Todavía no tienes movimientos registrados.
        </div>

    </div>

    <button class="back-btn" onclick="location.href='shop.html'">
        ⬅ Volver a la Tienda
    </button>

</div>

</body>
</html>
