box-shadow:inset 0 0 8px rgba(255,255,255,.8);

}

.songs-box{

<body>

<div class="controls" id="controlsBox">

    <button id="closeSongs">Cerrar</button>
  </div>

<script>


const AudioContextClass=
window.AudioContext||
window.webkitAudioContext;

let audioCtx;
let sustain=false;
let locked=false;
const cache={};
let currentMidiFile = null;
let midiStartTime = 0;
let pausedTime = 0;
const songsBtn = document.getElementById("songsBtn");
const songsModal = document.getElementById("songsModal");
const closeSongs = document.getElementById("closeSongs");

songsBtn.onclick = () => {
  songsModal.classList.remove("hidden");
};


closeSongs.onclick = () => {
  songsModal.classList.add("hidden");

};

document.querySelectorAll(".song-item").forEach(btn=>{
btn.onclick=async()=>{
const file=btn.dataset.file;

songsModal.classList.add("hidden");

if(window.currentMidi){
window.currentMidi.stop();
}

loadMidi(file);
};
});

const mainTitle=document.getElementById("mainTitle");
const brandText=document.getElementById("brandText");
const controlsBox=document.getElementById("controlsBox");


function clearAllLights(){
document.querySelectorAll(".key")
.forEach(key=>{
key.classList.remove(
"left-hand",
"right-hand"
);
});
}

function initAudio(){
if(!audioCtx)
audioCtx=new AudioContextClass();
}

function pauseMidi(){
  if(window.currentMidi){
    pausedTime = Date.now() - midiStartTime;
    window.currentMidi.stop();
  }
}

function resumeMidi(){
  if(currentMidiFile && pausedTime > 0){
    loadMidi(currentMidiFile, pausedTime);
  }
}

document.getElementById("pedal").onclick=()=>{
sustain=!sustain;
document.getElementById("pedal").textContent=
"Sustain "+(sustain?"ON":"OFF");
};


document.getElementById("menuBtn").onclick=()=>{
location.href="menu.html";
};

const SAMPLE_NOTES=[
"A0","C1","Ds1","Fs1","A1","C2","Ds2","Fs2","A2",
"C3","Ds3","Fs3","A3","C4","Ds4","Fs4","A4",
"C5","Ds5","Fs5","A5","C6","Ds6","Fs6","A6",
"C7","Ds7","Fs7","A7","C8"
];

function noteToMidi(name){
const map={
C:0,Cs:1,D:2,Ds:3,E:4,
F:5,Fs:6,G:7,Gs:8,A:9,
As:10,B:11
};

const m=name.match(/^([A-G]s?)(\d)$/);

return (parseInt(m[2])+1)*12+map[m[1]];
}

function getBestSample(noteId){
const midi=noteId+21;
let best=SAMPLE_NOTES[0], diff=999;

for(const s of SAMPLE_NOTES){
const d=Math.abs(midi-noteToMidi(s));
if(d<diff){
diff=d;
best=s;
}
}

const semitones=
midi-noteToMidi(best);

return{
file:`audio/${best}v8.mp3`,
rate:Math.pow(2,semitones/12)
};
}

async function loadSample(file){
if(cache[file]) return cache[file];

const r=await fetch(file);
const b=await r.arrayBuffer();
const a=await audioCtx.decodeAudioData(b);

cache[file]=a;
return a;
}

async function playNote(noteId){
initAudio();

const s=getBestSample(noteId);
const buffer=await loadSample(s.file);

const src=audioCtx.createBufferSource();
src.buffer=buffer;
src.playbackRate.value=s.rate;

const gain=audioCtx.createGain();
gain.gain.value=1.0;

src.connect(gain);
gain.connect(audioCtx.destination);

src.start();

if(!sustain){
gain.gain.exponentialRampToValueAtTime(
0.001,
audioCtx.currentTime+1.5
);
src.stop(audioCtx.currentTime+1.6);
}
}


async function loadMidi(file, startAt = 0){
currentMidiFile = file;
midiStartTime = Date.now() - startAt;
pausedTime = 0; 
 try{
    const response = await fetch(file);
    const arrayBuffer = await response.arrayBuffer();
    const midi = new Midi(arrayBuffer);

    if(window.currentMidi){
      window.currentMidi.stop();
    }

    let timeoutIds=[];

    window.currentMidi={
      stop(){
        timeoutIds.forEach(id=>clearTimeout(id));
        clearAllLights();
      }
    };

    midi.tracks.forEach(track=>{
track.notes.forEach(note=>{
if((note.time*1000) < startAt) return;
        const id=setTimeout(()=>{
          playNote(note.midi-21);

          const key=document.querySelector(`[data-note="${note.midi-21}"]`);
          if(key){
            key.classList.add(note.midi<60 ? "left-hand":"right-hand");

            setTimeout(()=>{
              key.classList.remove("left-hand","right-hand");
            }, note.duration*1000);
          }
      }, (note.time*1000) - startAt);

        timeoutIds.push(id);
      });
    });

  }catch(err){
    console.log("Error cargando MIDI:", err);
  }
}



const names=[
"Do","Do#","Re","Re#",
"Mi","Fa","Fa#","Sol",
"Sol#","La","La#","Si"
];

const keyboard=document.getElementById("keyboard");
let white=0;

for(let i=0;i<88;i++){

const note=(i+9)%12;
const oct=Math.floor((i+9)/12);
const black=names[note].includes("#");

const key=document.createElement("div");
key.className="key"+(black?" black":"");
key.dataset.note=i;

const label=document.createElement("span");
label.className="label";
label.textContent=names[note]+oct;

key.appendChild(label);

if(black){
key.style.left=(white*38)+"px";
}else{
white++;
}

key.addEventListener("touchstart", async (e) => {
e.stopPropagation();
key.classList.add("active");
playNote(i);

setTimeout(()=>{
key.classList.remove("active");
},120);
});

keyboard.appendChild(key);
}


</script>
