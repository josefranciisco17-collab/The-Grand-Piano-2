<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recargar Monedas - The Grand Piano</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.92)),
url("background.png") center/cover no-repeat fixed;

color:#fff;
padding:22px;

}

.container{

max-width:760px;
margin:auto;

background:#151515;

border:1px solid rgba(212,175,55,.18);

border-radius:30px;

padding:26px;

box-shadow:
0 0 40px rgba(212,175,55,.08);

}

.topbar{

display:flex;
align-items:center;
justify-content:space-between;

margin-bottom:20px;

}

.back-btn{

width:52px;
height:52px;

border:none;

border-radius:15px;

background:#232323;

color:#fff;

font-size:24px;

cursor:pointer;

}

.page-title{

flex:1;

margin-left:16px;

font-size:24px;

font-weight:bold;

}

.page-icon{

font-size:32px;

color:#d4af37;

}

hr{

border:none;

height:1px;

background:#2a2a2a;

margin:18px 0 26px;

}

.subtitle{

text-align:center;

font-size:17px;

line-height:1.6;

color:#b8b8b8;

margin-bottom:28px;

}

.wallet-panel{

background:#1c1c1c;

border-radius:22px;

padding:24px;

margin-bottom:30px;

border:1px solid #2a2a2a;

}

.wallet-label{

font-size:15px;

font-weight:bold;

color:#9d9d9d;

text-transform:uppercase;

}

.wallet-balance{

margin-top:10px;

font-size:56px;

font-weight:bold;

color:#d4af37;

}

.package-card{

display:flex;
justify-content:space-between;
align-items:center;

background:#1c1c1c;

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:18px 20px;

margin-bottom:14px;

transition:.25s;

}

.package-card:hover{

transform:translateY(-2px);

border-color:#d4af37;

box-shadow:0 10px 30px rgba(0,0,0,.35);

}

.package-info{

display:flex;

flex-direction:column;

gap:6px;

}

.package-coins{

font-size:22px;

font-weight:700;

color:#fff;

}

.package-price{

font-size:16px;

font-weight:600;

color:#d4af37;

}

.package-tag{

display:inline-block;

padding:4px 10px;

background:rgba(212,175,55,.12);

border:1px solid rgba(212,175,55,.25);

border-radius:999px;

font-size:11px;

color:#d4af37;

width:max-content;

}

.buy-btn{

padding:12px 18px;

border:none;

border-radius:12px;

background:#d4af37;

color:#111;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

.buy-btn:hover{

background:#e7c85d;

}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
padding:20px;
z-index:9999;
}

.modal-content{
width:100%;
max-width:400px;
background:#1c1c1c;
border:1px solid rgba(212,175,55,.30);
border-radius:20px;
padding:24px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.modal-content h2{
font-size:24px;
margin-bottom:15px;
color:#fff;
}

#modalCoins,
#modalPrice{
font-size:20px;
font-weight:700;
margin:10px 0;
color:#d4af37;
}

.modal-buttons{
display:flex;
gap:12px;
margin-top:22px;
}

.modal-buttons button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

#continuePurchase{
background:#d4af37;
color:#111;
}

#closeModal{
background:#333;
color:#fff;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">

<button class="back-btn" onclick="history.back()">
←
</button>

<div class="page-title">
Recargar monedas
</div>

<div class="page-icon">
🪙
</div>

</div>

<hr>

<div class="subtitle">
Compra monedas de forma rápida y segura mediante transferencia bancaria.
</div>

<div class="wallet-panel">

<div class="wallet-label">
Saldo disponible
</div>

<div class="wallet-balance" id="coinBalance">
0 Monedas
</div>

</div>

<div class="package-card">

<div class="package-info">

<div class="package-coins">
🪙 50 Monedas
</div>

<div class="package-price">
$40 MXN
</div>

<div class="package-tag">
Popular
</div>

</div>

<button
class="buy-btn"
data-coins="50"
data-price="$40 MXN">
Comprar
</button>

</div>
