<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grand Piano Login</title>

<style>

body{
    margin:0;
    font-family:Georgia,serif;
    color:white;
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.92)),
    url("background.png") center/cover no-repeat fixed;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px 20px 40px;
}

.card{
    width:90%;
    max-width:420px;
    margin-top:10px;
    padding:25px 35px 35px;
    border-radius:35px;
    background:rgba(10,10,10,.92);
    border:1px solid rgba(212,175,55,.35);
    box-shadow:
        0 0 40px rgba(212,175,55,.12),
        0 0 20px rgba(255,255,255,.05);
    text-align:center;
    backdrop-filter:blur(10px);
}


.logo{
    display:flex;
    justify-content:center;
    margin-top:-40px;
    margin-bottom:20px;
}


.logo img{
width:280px;
height:280px;
object-fit:contain;
filter:drop-shadow(0 0 14px rgba(212,175,55,.35));
}
  
h1{
    font-size:34px;
    margin-top:-35px;
    margin-bottom:8px;
    line-height:1.05;
    font-weight:bold;
    color:#d4af37;
    text-shadow:0 0 18px rgba(212,175,55,.35);
}


p{
    color:white;
    margin-top:0px;
    margin-bottom:15px;
    font-size:16px;
    line-height:1.4;
}

input{
width:100%;
padding:18px;
margin:4px 0;
border-radius:18px;
background:rgba(20,20,20,.95);
border:1px solid rgba(212,175,55,.25);
color:white;
font-size:18px;
box-sizing:border-box;
outline:none;
text-align:center;
}

input::placeholder{
color:#999;
}

.password-box{
position:relative;
width:100%;
}

.password-box input{
padding-right:55px;
}

#togglePassword{
position:absolute;
right:18px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:22px;
color:#d4af37;
user-select:none;
}

button{
width:100%;
padding:18px;
margin:10px 0;
border-radius:20px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.02);
}

.btn-login,
.btn-register,
.btn-google{
background:rgba(10,10,10,.95);
border:1px solid rgba(212,175,55,.85);
color:#d4af37;
box-shadow:0 0 12px rgba(212,175,55,.12);
}

.link{
margin-top:18px;
display:block;
color:#d4af37;
cursor:pointer;
font-size:17px;
}

.footer{
margin-top:22px;
font-size:16px;
color:#d4af37;
letter-spacing:1px;
text-align:center;
font-weight:500;
opacity:.95;
}

</style>
</head>
<body>

<div class="card">

  <div class="logo">
  <img src="icon.png" alt="Logo">
  </div>

<h1>The Grand Piano</h1>

<p>
Accede para jugar el piano, con un sonido de un piano de madera, ven  y diviértete.
</p>

<input type="email" id="email" placeholder="Correo electrónico">

<div class="password-box">
<input type="password" id="password" placeholder="Contraseña">
<span id="togglePassword">👁️</span>
</div>

<button class="btn-login" onclick="loginEmail()">
Iniciar sesión
</button>

<button class="btn-register" onclick="registerEmail()">
Crear cuenta
</button>

<button class="btn-google" onclick="loginGoogle()">
Entrar con Google
</button>

<span class="link" onclick="resetPassword()">
¿Olvidaste tu contraseña?
</span>

<div class="footer">
Desarrollado por JFAM & Co. Piano Studios.
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyArKUqthRHDrO1xXn39wJP-JCiBZdilOcY",
authDomain: "piano-deluxe-premium.firebaseapp.com",
projectId: "piano-deluxe-premium",
storageBucket: "piano-deluxe-premium.firebasestorage.app",
messagingSenderId: "79307845171",
appId: "1:79307845171:web:c21918694f6d916fbbfd46"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.loginGoogle = async()=>{

try{
await signInWithPopup(auth,provider);

localStorage.setItem(
"loginSuccess",
"Haz iniciado sesión correctamente"
);

location.href="menu.html";

}catch(e){
alert(e.message);
}

};

window.loginEmail = async()=>{

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

if(!email || !password){

alert(
"Correo y contraseña requeridos para iniciar sesión"
);

return;

}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

localStorage.setItem(
"loginSuccess",
"Haz iniciado sesión correctamente 🎹"
);

location.href="menu.html";

}catch(e){

alert(e.message);

}

};

window.registerEmail = async()=>{

const email =
document.getElementById("email").value.trim();

const password =
document.getElementById("password").value.trim();

if(!email || !password){

alert(
"Correo y contraseña requeridos para crear cuenta"
);

return;

}

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("Cuenta creada correctamente 🎹");

}catch(e){

alert(e.message);

}

};

window.resetPassword = async()=>{

const email =
document.getElementById("email").value.trim();

if(!email){

alert("Escribe tu correo primero");

return;

}

try{

await sendPasswordResetEmail(auth,email);

alert(
"Te enviamos un correo para restablecer tu contraseña 📩"
);

}catch(e){

alert(e.message);

}

};

const togglePassword =
document.getElementById("togglePassword");

const passwordInput =
document.getElementById("password");

togglePassword.onclick=()=>{

if(passwordInput.type==="password"){

passwordInput.type="text";
togglePassword.textContent="🙈";

}else{

passwordInput.type="password";
togglePassword.textContent="👁️";

}

};

</script>

</body>
</html>
