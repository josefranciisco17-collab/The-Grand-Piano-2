<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Panel Admin</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.section{
background:#111;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

h1,h2{
text-align:center;
}

button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
}

.white-btn{
background:white;
color:black;
}

.red-btn{
background:#a30000;
color:white;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin:8px 0;
background:#222;
color:white;
}
</style>
</head>
<body>

<div class="container">

<h1>👑 Panel Admin</h1>

<div class="section">
<h2>🔐 Seguridad</h2>

<input type="password" id="newPass" placeholder="Nueva contraseña">

<button class="white-btn" onclick="changePassword()">
Cambiar contraseña
</button>

<button class="red-btn" onclick="restorePassword()">
Restablecer Flor 7272
</button>
</div>

<div class="section">
<h2>🎵 Song Manager</h2>

<button class="white-btn">Agregar canción</button>
<button class="white-btn">Eliminar canción</button>
<button class="white-btn">Importar MIDI</button>
<button class="white-btn">Editar dificultad</button>
</div>

<div class="section">
<h2>👤 Player Control</h2>

<button class="white-btn">Ver jugadores</button>
<button class="white-btn">Editar rango</button>
<button class="white-btn">Banear jugador</button>
<button class="white-btn">Resetear progreso</button>
</div>

<div class="section">
<h2>☁ Database Control</h2>

<button class="white-btn">Backup total</button>
<button class="white-btn">Restaurar backup</button>
<button class="white-btn">Exportar datos</button>
<button class="white-btn">Sync manual</button>
</div>

<div class="section">
<h2>🎹 Engine Control</h2>

<button class="white-btn">Velocidad global</button>
<button class="white-btn">Spawn Rate</button>
<button class="white-btn">Combo Multiplier</button>
<button class="white-btn">Fever Settings</button>
</div>

<div class="section">
<h2>📊 Analytics</h2>

<button class="white-btn">Jugadores activos</button>
<button class="white-btn">Canción más jugada</button>
<button class="white-btn">Récord global</button>
<button class="white-btn">Precisión promedio</button>
</div>

<div class="section">
<h2>🛠 Owner Tools</h2>

<button class="white-btn">Debug Logs</button>
<button class="white-btn">Estado del sistema</button>
<button class="red-btn">Restaurar Build Estable</button>
</div>

<button class="white-btn" onclick="location.href='menu.html'">
Volver
</button>

</div>

<script>
function changePassword(){
const newPass =
document.getElementById("newPass").value.trim();

if(!newPass){
alert("Ingresa una contraseña");
return;
}

localStorage.setItem("adminPassword",newPass);
alert("Contraseña actualizada");
}

function restorePassword(){
localStorage.removeItem("adminPassword");
alert("Contraseña restaurada a Flor 7272");
}
</script>

</body>
</html>
